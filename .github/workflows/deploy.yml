name: Build & Deploy Maktaba

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [content_update]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Maktaba Code
        uses: actions/checkout@v4

      - name: Checkout Private Vault Content
        uses: actions/checkout@v4
        with:
          repository: Mughal-Hash-24/Kybernetes-content
          ssh-key: ${{ secrets.VAULT_DEPLOY_KEY }}
          path: vault-content

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Content Pipeline
        run: npm run build:content
        env:
          VAULT_PATH: vault-content

      - name: Restore Embeddings Cache
        uses: actions/cache@v4
        with:
          path: content/embeddings-cache.json
          key: embeddings-cache-${{ hashFiles('vault-content/**/*.md') }}
          restore-keys: embeddings-cache-

      - name: Build Embeddings
        run: npm run build:embeddings
        env:
          VECTORIZE_BACKEND_URL: ${{ secrets.VECTORIZE_BACKEND_URL }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
